name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: privacy
    attributes:
      label: Privacy impact
      options:
        - No new data or permissions
        - New local data only
        - New Android permission
        - Network or account dependency
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
