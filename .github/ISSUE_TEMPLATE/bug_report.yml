name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not attach real contacts, calendars, backups, or notification screenshots containing personal data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: Pixel 8, Android 16
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include sanitized logs or screenshots only.
